<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Eventos | Deco-One</title>
    <link rel="stylesheet" href="../../css/base/variables.css">
    <link rel="stylesheet" href="../../css/base/global.css">
    <link rel="stylesheet" href="../../css/components/sidebar.css">
    <link rel="stylesheet" href="../../css/components/navbarAdmin.css">
    <link rel="stylesheet" href="../../css/components/panel-admin.css">
    <link rel="stylesheet" href="../../css/components/modal.css">
    <link rel="stylesheet" href="../../css/components/botones.css">
    <link rel="stylesheet" href="../../css/components/badges.css">
    <link rel="stylesheet" href="../../css/components/navMes.css">
    <link rel="stylesheet" href="../../css/views/historial.css">
    <link rel="stylesheet" href="../../css/base/responsive.css">

</head>
<body class="body-admin">
    <div id="navbar-placeholder"></div>

    <div class="contenedor-dashboard">
        <div id="sidebar-placeholder"></div>

        <main class="dashboard-container">
        <section class="titulo-historial">
                <div>
                    <h2>Historial de eventos</h2>
                    <div class="controles-historial">
                        <select id="filtroFechaHistorial" class="select-filtro-historial">
                            <option value="defecto">Por defecto (Mes a mes)</option>
                            <option value="hoy">Hoy</option>
                            <option value="semana">Esta semana</option>
                            <option value="mes">Este mes (Completo)</option>
                        </select>
                        
                        <div class="navegacion-mes" id="contNavegacionMes">
                            <button type="button" id="botonMesAnterior"><i data-lucide="chevron-left"></i></button>
                            <span id="etiquetaMesHistorial">—</span>
                            <button type="button" id="botonMesSiguiente"><i data-lucide="chevron-right"></i></button>
                        </div>
                    </div>
                </div>
                <button type="button" class="boton-agregar-evento" id="botonAbrirModalEvento">
                    <i data-lucide="plus"></i> Agregar
                </button>
            </section>

            <div class="separador-historial"></div>

            <section class="grid-historial" id="gridHistorial">
                <!-- JS genera aquí cada tarjeta -->
            </section>
        </main>
    </div>

    <!-- Ventana emergente para agregar nuevo evento de manera manual sin aceptar solicitudes -->
<div id="modalNuevoEvento" class="modal-overlay oculto">
        <div class="modal-contenedor">
            <div class="modal-cabecera">
                <div class="modal-titulo">
                    <i data-lucide="calendar-plus"></i>
                    <h3>AGREGAR EVENTO</h3>
                </div>
                <button type="button" class="boton-cerrar-modal" id="botonCerrarModal">&times;</button>
            </div>
            
            <form id="formularioNuevoEvento" class="modal-formulario">
                <div class="campo-formulario">
                    <label>NOMBRE DEL EVENTO / CLIENTE</label>
                    <input type="text" id="inputNombreEvento" placeholder="Ej: Boda Familia Gómez o Baby Shower García" required>
                </div>

                <div class="fila-modal">
                    <div class="campo-formulario">
                        <label>TIPO DE EVENTO</label>
                        <input type="text" id="inputTipoEvento" placeholder="Ej: Boda, XV Años, Infantil" required>
                    </div>
                    <div class="campo-formulario">
                        <label>FECHA DEL EVENTO</label>
                        <input type="date" id="inputFechaEvento" required>
                    </div>
                </div>

                <div class="fila-modal">
                    <div class="campo-formulario">
                        <label>HORA DE INICIO</label>
                        <input type="time" id="inputHoraInicio" required>
                    </div>
                    <div class="campo-formulario">
                        <label>HORA DE RECOGER MATERIAL</label>
                        <input type="time" id="inputHoraRecoger" required>
                    </div>
                </div>

                <div class="campo-formulario">
                    <label>LUGAR / SALÓN</label>
                    <select id="inputSalonEvento" required>
                        <option value="" disabled selected>Selecciona una ubicación</option>
                        <option value="Por definir">Por definir</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label>ESTADO DEL EVENTO (OPCIONAL)</label>
                    <select id="inputEstadoManual">
                        <option value="auto" selected>Automático (Por fecha y hora)</option>
                        <option value="curso">Forzar: En Curso</option>
                        <option value="terminado">Forzar: Terminado</option>
                    </select>
                </div>
                
                <div class="fila-modal">
                    <div class="campo-formulario">
                        <label>PRESUPUESTO APROXIMADO ($)</label>
                        <input type="number" id="inputPresupuesto" placeholder="Ej: 5000" min="0" step="0.01">
                    </div>
                    <div class="campo-formulario">
                        <label>TAMAÑO DEL EVENTO</label>
                        <input type="text" id="inputTamanoEvento" readonly placeholder="Calculado auto.">
                    </div>
                </div>
                <div class="campo-formulario">
                    <label>ABONO REQUERIDO ($)</label>
                    <input type="text" id="inputAbonoRequerido" readonly placeholder="Calculado auto.">
                </div>

                <!-- ==========================================
                     NUEVA SECCIÓN: ASIGNACIÓN DE MATERIALES 
                     ========================================== -->
                <div class="seccion-materiales" style="margin-top: 1rem; border-top: 1px solid #2a3b47; padding-top: 1.5rem; margin-bottom: 1.5rem;">
                    <h4 style="margin-bottom: 1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; font-weight: 500;">
                        <i data-lucide="boxes" style="width: 18px; height: 18px;"></i> MATERIALES DEL INVENTARIO
                    </h4>
                    
                    <div class="fila-modal" style="align-items: flex-end; margin-bottom: 1rem;">
                        <div class="campo-formulario" style="flex: 2; margin-bottom: 0;">
                            <label>SELECCIONAR MATERIAL</label>
                            <select id="selectMaterialDinamico" style="width: 100%; cursor: pointer;">
                                <option value="">Cargando inventario...</option>
                            </select>
                        </div>
                        <div class="campo-formulario" style="flex: 1; margin-bottom: 0;">
                            <label>CANTIDAD</label>
                            <input type="number" id="inputCantidadMaterial" min="1" placeholder="Ej: 10">
                        </div>
                        <button type="button" id="btnAgregarMaterialAlEvento" class="boton-secundario" style="height: 42px; margin-bottom: 0; padding: 0 1.5rem;">
                            Añadir
                        </button>
                    </div>

                    <div style="max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.15); border-radius: 8px; border: 1px solid #2a3b47;">
                        <table class="tabla-inventario" style="margin: 0; width: 100%; font-size: 0.85rem;">
                            <thead style="background: rgba(0,0,0,0.25);">
                                <tr>
                                    <th style="padding: 0.5rem 1rem;">MATERIAL</th>
                                    <th style="padding: 0.5rem 1rem; text-align: center;">CANTIDAD</th>
                                    <th style="padding: 0.5rem 1rem; text-align: center;">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody id="tablaMaterialesDinamicos">
                                <tr><td colspan="3" style="text-align:center; padding: 1rem; color:#8fa0a8;">Sin materiales asignados</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- ========================================== -->

                <div class="modal-acciones">
                    <button type="button" class="boton-secundario" id="botonCancelarModal">Cancelar</button>
                    <button type="submit" class="boton-primario">Confirmar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalVerDetalles" class="modal-overlay oculto">
        <div class="modal-contenedor">
            <div class="modal-cabecera">
                <div class="modal-titulo">
                    <i data-lucide="info"></i>
                    <h3>Detalles del Evento</h3>
                </div>
                <button type="button" class="boton-cerrar-modal" id="botonCerrarDetalles">&times;</button>
            </div>
            
            <div class="modal-cuerpo-detalles">
                <div class="campo-detalle">
                    <label>NOMBRE DEL EVENTO / CLIENTE</label>
                    <p id="detNombre">—</p>
                </div>
                <div class="fila-modal">
                    <div class="campo-detalle">
                        <label>TIPO DE EVENTO</label>
                        <p id="detTipo">—</p>
                    </div>
                    <div class="campo-detalle">
                        <label>FECHA</label>
                        <p id="detFecha">—</p>
                    </div>
                </div>
                <div class="fila-modal">
                    <div class="campo-detalle">
                        <label>HORA INICIO</label>
                        <p id="detHoraInicio">—</p>
                    </div>
                    <div class="campo-detalle">
                        <label>HORA RECOGER MATERIAL</label>
                        <p id="detHoraRecoger">—</p>
                    </div>
                </div>
                <div class="campo-detalle">
                    <label>LUGAR / SALÓN</label>
                    <p id="detSalon">—</p>
                </div>
                <div class="fila-modal">
                    <div class="campo-detalle">
                        <label>PRESUPUESTO</label>
                        <p id="detPresupuesto">—</p>
                    </div>
                    <div class="campo-detalle">
                        <label>ABONO REQUERIDO</label>
                        <p id="detAbono">—</p>
                    </div>
                </div>
                <div class="fila-modal">
                    <div class="campo-detalle">
                        <label>TAMAÑO DEL EVENTO</label>
                        <p id="detTamano">—</p>
                    </div>
                    <div class="campo-detalle">
                        <label>SOLICITANTE</label>
                        <p id="detSolicitante">—</p>
                    </div>
                </div>
                <div class="campo-detalle">
                    <label>MATERIALES A UTILIZAR</label>
                    <p id="detMateriales" style="white-space: pre-line;">—</p>
                </div>
                <div class="campo-detalle">
                    <label>MENSAJE DEL CLIENTE</label>
                    <p id="detMensajeCliente" style="white-space: pre-line; font-style: italic; color: #8fa0a8;">—</p>
                </div>
                <div class="modal-acciones" style="margin-top: 1.5rem;">
                    <button type="button" class="boton-primario" id="botonCerrarDetallesAceptar">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../../js/core/localStorage.js"></script>
    <script src="../../js/components/navbar-admin.js"></script>
    <script src="../../js/components/sidebar-admin.js"></script>
    <script src="../../js/components/modal-evento.js"></script>
    <script src="../../js/components/layout-loader.js"></script>
    
    <script type="module" src="../../js/views/historial.js"></script>
</body>
</html>
