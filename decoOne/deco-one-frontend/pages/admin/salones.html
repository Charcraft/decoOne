<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salones | Deco-One</title>
    <link rel="stylesheet" href="../../css/base/variables.css">
    <link rel="stylesheet" href="../../css/base/global.css">
    <link rel="stylesheet" href="../../css/components/sidebar.css">
    <link rel="stylesheet" href="../../css/components/navbarAdmin.css">
    <link rel="stylesheet" href="../../css/components/tarjetas.css">
        <link rel="stylesheet" href="../../css/base/responsive.css">

</head>
<body class="body-admin">
    <div id="navbar-placeholder"></div>

    <div class="contenedor-dashboard">
        <div id="sidebar-placeholder"></div>

        <main class="dashboard-container">
            <section class="titulo-salones" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>Salones</h2>
                    <p>Administración de salones.</p>
                </div>
                <button type="button" class="boton-agregar-evento" id="botonAbrirModalSalon" style="padding: 10px 20px; background-color: var(--color-primario); color: white; border: none; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="plus"></i> Agregar
                </button>
            </section>

            <section class="contenedor-tarjetas-salones" id="contenedorTarjetasSalones">
                <div class="contenedor-tarjetas" id="gridSalones">
                    <!-- JS generará aquí las tarjetas -->
                </div>    
            </section>
        </main>
    </div>

        <script src="https://unpkg.com/lucide@latest"></script>
        <script>
            lucide.createIcons();
        </script>
    <script src="../../js/core/localStorage.js"></script>
    <script src="../../js/components/navbar-admin.js"></script>
    <script src="../../js/components/sidebar-admin.js"></script>
    <script src="../../js/components/layout-loader.js"></script>
    <script src="../../js/views/salones.js"></script>

    <!-- Modal para Agregar/Editar Salón -->
    <div id="modalSalon" class="modal-overlay oculto" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-contenedor" style="background: var(--bg-secundario, #1a2a32); padding: 20px; border-radius: 8px; width: 400px; color: white;">
            <div class="modal-cabecera" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="modalSalonTitulo">Agregar Salón</h3>
                <button type="button" id="btnCerrarModalSalon" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">&times;</button>
            </div>
            <form id="formularioSalon">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Nombre</label>
                    <input type="text" id="inputNombreSalon" required style="width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid #2a3b47; color: white; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Horario</label>
                    <input type="text" id="inputHorarioSalon" placeholder="Ej: 5:00 AM - 12:00 AM" required style="width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid #2a3b47; color: white; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Dirección</label>
                    <input type="text" id="inputDireccionSalon" required style="width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid #2a3b47; color: white; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">Contacto</label>
                    <input type="text" id="inputContactoSalon" required style="width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid #2a3b47; color: white; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px;">URL de Imagen o Archivo Local</label>
                    <input type="url" id="inputImagenSalon" placeholder="URL de la imagen (Opcional si subes archivo)" style="width: 100%; padding: 8px; box-sizing: border-box; background: rgba(0,0,0,0.2); border: 1px solid #2a3b47; color: white; border-radius: 4px; margin-bottom: 8px;">
                    <input type="file" id="inputFileImagenSalon" accept="image/*" style="width: 100%; color: white; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" id="btnCancelarSalon" style="padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; background: #2a3b47; color: white;">Cancelar</button>
                    <button type="submit" style="padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; background: #46c4be; color: #112a31; font-weight: bold;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
